name: Validate brief

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Detect changed brief files
        id: changed
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            files=$(git diff --name-only --diff-filter=AMR "$base" "$head" -- 'content/briefs/*.mdx' 'content/briefs/*.md' || true)
            deletions=$(git diff --name-only --diff-filter=D "$base" "$head" -- 'content/briefs/*.mdx' 'content/briefs/*.md' || true)
            sidecar_edits=$(git diff --name-only --diff-filter=MR "$base" "$head" -- 'content/briefs/*.data.ts' || true)
            sidecar_adds=$(git diff --name-only --diff-filter=A "$base" "$head" -- 'content/briefs/*.data.ts' || true)
            sidecar_dels=$(git diff --name-only --diff-filter=D "$base" "$head" -- 'content/briefs/*.data.ts' || true)
          else
            files=$(ls content/briefs/*.mdx content/briefs/*.md 2>/dev/null || true)
            deletions=""
            sidecar_edits=""
            sidecar_adds=""
            sidecar_dels=""
          fi
          # If any brief was deleted, re-validate all remaining briefs so continuity gaps
          # introduced by the deletion surface through validate-brief.ts's peer checks.
          # Sidecar (.data.ts) *edits* also trigger full-set validation: the brief-length
          # check reads sidecar prose, so a sidecar-only edit can violate the word-count
          # floor without touching any .mdx file.
          if [ -n "$deletions" ] || [ -n "$sidecar_edits" ]; then
            if [ -n "$deletions" ]; then
              echo "Brief deletion(s) detected:"
              echo "$deletions"
            fi
            if [ -n "$sidecar_edits" ]; then
              echo "Sidecar (.data.ts) edit(s) detected:"
              echo "$sidecar_edits"
            fi
            echo "Validating the full current brief set."
            files=$(ls content/briefs/*.mdx content/briefs/*.md 2>/dev/null || true)
          elif [ -n "$sidecar_adds" ] || [ -n "$sidecar_dels" ]; then
            # Sidecar *additions or deletions* for existing briefs (e.g. a backfill adding
            # a sidecar, or a PR removing one) must still run the validator so the
            # sidecar-presence + word-count checks fire on the companion .mdx. For each
            # affected sidecar, pull its companion .mdx into $files (de-duplicated against
            # entries already there from a same-PR .mdx change). A deletion leaves the
            # companion orphaned, so the validator will correctly surface the missing
            # sidecar error.
            if [ -n "$sidecar_adds" ]; then
              echo "Sidecar (.data.ts) addition(s) detected:"
              echo "$sidecar_adds"
            fi
            if [ -n "$sidecar_dels" ]; then
              echo "Sidecar (.data.ts) deletion(s) detected:"
              echo "$sidecar_dels"
            fi
            sidecar_presence_changes=$(printf '%s\n%s' "$sidecar_adds" "$sidecar_dels")
            while IFS= read -r sidecar; do
              [ -z "$sidecar" ] && continue
              companion="${sidecar%.data.ts}.mdx"
              if [ ! -f "$companion" ]; then
                companion="${sidecar%.data.ts}.md"
              fi
              if [ -f "$companion" ] && ! printf '%s\n' "$files" | grep -qxF "$companion"; then
                if [ -z "$files" ]; then
                  files="$companion"
                else
                  files=$(printf '%s\n%s' "$files" "$companion")
                fi
              fi
            done <<< "$sidecar_presence_changes"
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate briefs
        id: validate
        run: |
          set -e
          files="${{ steps.changed.outputs.files }}"
          if [ -z "$files" ]; then
            echo "No brief changes in this PR. Skipping brief validation."
            exit 0
          fi
          echo "Validating:"
          echo "$files"
          # shellcheck disable=SC2086
          npm run validate-brief -- $files

      - name: Build site (type check + prebuild aggregation)
        run: npm run build

      - name: Label PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review']
            });

  automerge:
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'claude-bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
