<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ME War — Intel Brief</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; min-height: 100vh; }
  button { font: inherit; }
  /* Reserve space for fixed bottom scrubber */
  #root > div > div:first-child { padding-bottom: 108px !important; }
  ::selection { background: #B33A2E; color: #fff; }

  /* =========================================================
     Responsive layout classes
     Breakpoints: mobile <720, tablet 720–1100, desktop >=1100
     ========================================================= */

  /* Page gutters — override the inline desktop padding on narrow screens */
  @media (max-width: 720px) {
    #root [data-page-shell] {
      padding: 16px 14px !important;
    }
  }
  @media (min-width: 721px) and (max-width: 1024px) {
    #root [data-page-shell] {
      padding: 22px 24px !important;
    }
  }

  /* --- Masthead (title bar + sub-nav) --- */
  .mw-masthead-bar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .mw-masthead-title { font-size: 32px; }
  .mw-masthead-meta { font-size: 10px; padding-left: 12px; border-left: 1px solid var(--mw-rule-soft, transparent); }
  .mw-masthead-stamp { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  @media (max-width: 720px) {
    .mw-masthead-title { font-size: 22px !important; letter-spacing: -0.01em !important; flex: 1 1 100%; }
    .mw-masthead-meta { display: none !important; }
    .mw-masthead-stamp { margin-left: 0 !important; }
  }

  /* --- Sub-nav tabs: scroll horizontally on mobile --- */
  .mw-subnav { display: flex; align-items: center; }
  .mw-subnav-tabs { display: contents; }
  @media (max-width: 900px) {
    .mw-subnav {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .mw-subnav::-webkit-scrollbar { display: none; }
    .mw-subnav-dateline { display: none !important; }
    .mw-subnav button { white-space: nowrap; padding: 10px 12px !important; font-size: 11px !important; }
  }

  /* --- Today: dateline + title row + indicators --- */
  .mw-hero { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; }
  .mw-hero-title { font-size: 52px; line-height: 1.02; }
  .mw-hero-indicators { text-align: right; min-width: 220px; }
  .mw-hero-indicators-rows { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  @media (max-width: 900px) {
    .mw-hero { grid-template-columns: 1fr !important; gap: 18px !important; }
    .mw-hero-title { font-size: 32px !important; line-height: 1.08 !important; }
    .mw-hero-indicators { text-align: left !important; min-width: 0 !important; }
    .mw-hero-indicators-rows { align-items: flex-start !important; }
  }
  @media (min-width: 901px) and (max-width: 1200px) {
    .mw-hero-title { font-size: 42px !important; }
  }

  /* --- Today: exec + key dev two-col --- */
  .mw-2col-hero { display: grid; grid-template-columns: 1.35fr 1fr; gap: 40px; }
  @media (max-width: 900px) {
    .mw-2col-hero { grid-template-columns: 1fr !important; gap: 24px !important; }
  }

  /* --- Generic 2-col (flash / sources, cadence) --- */
  .mw-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  @media (max-width: 720px) {
    .mw-2col { grid-template-columns: 1fr !important; gap: 24px !important; }
  }

  /* --- Implications 3-col --- */
  .mw-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }
  @media (max-width: 900px) {
    .mw-3col { grid-template-columns: 1fr !important; gap: 20px !important; }
  }
  @media (min-width: 901px) and (max-width: 1100px) {
    .mw-3col { grid-template-columns: 1fr 1fr !important; }
  }

  /* --- Casualties block (4 cards) --- */
  .mw-cas-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) {
    .mw-cas-grid { grid-template-columns: 1fr 1fr !important; }
  }

  /* --- 6-clock strip --- */
  .mw-clocks-strip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  @media (max-width: 1100px) {
    .mw-clocks-strip { grid-template-columns: repeat(3, 1fr) !important; }
  }
  @media (max-width: 520px) {
    .mw-clocks-strip { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* --- Clocks dashboard 3-col --- */
  .mw-clocks-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 900px) {
    .mw-clocks-dash { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 520px) {
    .mw-clocks-dash { grid-template-columns: 1fr !important; }
  }

  /* --- Timeline small multiples --- */
  .mw-2col-plain { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 720px) {
    .mw-2col-plain { grid-template-columns: 1fr !important; }
  }

  /* --- Archive rows (grid layout) --- */
  .mw-archive-row {
    display: grid;
    grid-template-columns: 70px 100px 1fr 120px 120px 100px;
    gap: 8px;
  }
  @media (max-width: 900px) {
    .mw-archive-row {
      grid-template-columns: 50px 1fr auto !important;
      grid-template-areas:
        "day date date"
        "day title title"
        "day dir pct" !important;
      row-gap: 4px !important;
    }
    .mw-archive-row > *:nth-child(1) { grid-area: day; align-self: start; }
    .mw-archive-row > *:nth-child(2) { grid-area: date; }
    .mw-archive-row > *:nth-child(3) { grid-area: title; }
    .mw-archive-row > *:nth-child(4) { grid-area: dir; }
    .mw-archive-row > *:nth-child(5) { display: none !important; }
    .mw-archive-row > *:nth-child(6) { grid-area: pct; text-align: right; }
    .mw-archive-header > *:nth-child(5) { display: none !important; }
  }

  /* --- Events table: horizontal scroll on narrow --- */
  .mw-events-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 900px) {
    .mw-events-wrap table { min-width: 900px; }
  }

  /* --- Scrubber --- */
  .mw-scrubber {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
    z-index: 50;
  }
  .mw-scrubber-label { display: inline-block; }
  .mw-scrubber-current { min-width: 130px; text-align: right; }
  @media (max-width: 720px) {
    .mw-scrubber { padding: 8px 10px !important; gap: 8px !important; flex-wrap: wrap; }
    .mw-scrubber-label { display: none !important; }
    .mw-scrubber-current {
      order: -1;
      flex: 1 1 100%;
      min-width: 0 !important;
      text-align: left !important;
    }
    .mw-scrubber-track { height: 28px; }
    .mw-scrubber-track button { height: 20px !important; }
    .mw-scrubber-track button.active { height: 28px !important; }
  }

  /* --- Footer --- */
  @media (max-width: 720px) {
    .mw-footer > *:last-child { margin-left: 0 !important; flex: 1 1 100%; }
  }

  /* --- Tweaks panel: full-width sheet on mobile --- */
  @media (max-width: 520px) {
    .mw-tweaks {
      top: auto !important;
      right: 0 !important;
      left: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      max-height: 70vh;
      overflow: auto;
    }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="src/tokens.jsx"></script>
<script type="text/babel" data-presets="react" src="src/data.jsx"></script>
<script type="text/babel" data-presets="react" src="src/clocks.jsx"></script>
<script type="text/babel" data-presets="react" src="src/today.jsx"></script>
<script type="text/babel" data-presets="react" src="src/views.jsx"></script>
<script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</script>
</body>
</html>
