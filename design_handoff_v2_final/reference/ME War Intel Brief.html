    badgeEscBg: "#2A1410",
    badgeMixBg: "#2A2310",
    badgeDeBg:  "#14240E",
    cardBg: "#101610",
    stamp: "#FF5D4A",
    font: {
      display: "'IBM Plex Mono', monospace",
      sans: "'IBM Plex Mono', monospace",
      mono: "'IBM Plex Mono', monospace",
    },
  },
};

// State -> color token (accent kind)
function stateTone(state) {
  switch (state) {
    case "critical": return "esc";
    case "low": return "esc";
    case "degraded": return "mix";
    case "none": return "neutral";
    case "moderate": return "mix";
    case "high": return "ok";
    case "ample": return "ok";
    default: return "neutral";
  }
}

// For clocks: higher score = better. Inverts meaning for some clocks.
// political_will, active_deadlines (high/critical = bad for peace)
// energy_infrastructure, interceptor_capacity, negotiation_capacity, oil_reserves (high = good)
const CLOCK_POLARITY = {
  political_will: "invert",         // high = war keeps going
  active_deadlines: "invert",       // high = ticking ultimatums
  energy_infrastructure: "normal",
  interceptor_capacity: "normal",
  negotiation_capacity: "normal",
  oil_reserves: "normal",
};

function clockToneFor(key, state) {
  const polarity = CLOCK_POLARITY[key];
  const base = stateTone(state);
  if (polarity === "invert") {
    if (base === "ok") return "esc";
    if (base === "esc") return "ok";
  }
  return base;
}

function toneColor(theme, tone) {
  switch (tone) {
    case "esc": return theme.accent;
    case "mix": return theme.accentAmber;
    case "ok":  return theme.accentGreen;
    default:    return theme.inkMute;
  }
}

function toneBadgeBg(theme, tone) {
  switch (tone) {
    case "esc": return theme.badgeEscBg;
    case "mix": return theme.badgeMixBg;
    case "ok":  return theme.badgeDeBg;
    default:    return "transparent";
  }
}

const RiskPill = ({ value, theme }) => {
  const tone = ["critical","extreme","escalating"].includes(value) ? "esc"
    : ["conditional","mixed"].includes(value) ? "mix"
    : ["contained","low","de-escalating"].includes(value) ? "ok"
    : "neutral";
  return (
    <span style={{

      padding: "3px 8px",
      fontFamily: theme.font.mono, fontSize: 11,
      letterSpacing: "0.08em", textTransform: "uppercase",

      background: toneBadgeBg(theme, tone),
      border: `1px solid ${toneColor(theme, tone)}40`,
      borderRadius: 0,
    }}>
      <span style={{ width: 6, height: 6, background: toneColor(theme, tone), display: "inline-block" }} />
      {value}
    </span>
  );
};

function trajArrow(t) {

}

// The clocks strip — 6 small dials + state + trajectory.
// Used on Today hero and Clocks dashboard.

function ClockScore(state) {
  return window.CLOCK_SCORE[state] ?? 0;
}

const ClockDial = ({ clockKey, state, trajectory, theme, sparkData }) => {
  const label = window.CLOCK_LABELS[clockKey];
  const tone = window.clockToneFor(clockKey, state);
  const color = window.toneColor(theme, tone);
  const score = ClockScore(state);
  const pct = score / 5; // 0..1

  // Dial: 180° arc, 12 segments, filled proportional to score
  const SEGS = 12;
  const filled = Math.round(pct * SEGS);

  return (
    <div style={{
      background: theme.cardBg,
      border: `1px solid ${theme.ruleSoft}`,
      borderTop: `2px solid ${color}`,
      padding: "14px 14px 12px",
      display: "flex", flexDirection: "column", gap: 6,
      position: "relative",
    }}>
      {/* Label row */}
      <div style={{
        fontFamily: theme.font.mono, fontSize: 10, letterSpacing: "0.14em",
        textTransform: "uppercase", color: theme.inkMute, lineHeight: 1.2,
        minHeight: 24,
      }}>{label}</div>

      {/* State word — the primary signal */}
      <div style={{
        fontFamily: theme.font.display, fontSize: 26, fontWeight: 600,
        color: color, letterSpacing: "-0.015em", textTransform: "uppercase",
        lineHeight: 1,
      }}>{state}</div>

      {/* Trajectory — supporting info */}
      <div style={{
        display: "flex", alignItems: "center", gap: 6,
        fontFamily: theme.font.mono, fontSize: 10,
        color: theme.inkMute, letterSpacing: "0.08em", textTransform: "uppercase",
      }}>
        <span style={{ color: color, fontSize: 12 }}>{window.trajArrow(trajectory)}</span>
        <span>{trajectory}</span>
      </div>

      {/* Segmented arc — smaller, bottom */}
      <svg viewBox="0 0 120 40" width="100%" height="40" style={{ display: "block", marginTop: 4 }}>
        {Array.from({ length: SEGS }).map((_, i) => {
          const a0 = Math.PI + (i / SEGS) * Math.PI;
          const a1 = Math.PI + ((i + 0.85) / SEGS) * Math.PI;
          const r0 = 26, r1 = 34;
          const cx = 60, cy = 36;
          const x00 = cx + r0 * Math.cos(a0), y00 = cy + r0 * Math.sin(a0);
          const x01 = cx + r1 * Math.cos(a0), y01 = cy + r1 * Math.sin(a0);
          const x10 = cx + r0 * Math.cos(a1), y10 = cy + r0 * Math.sin(a1);
          const x11 = cx + r1 * Math.cos(a1), y11 = cy + r1 * Math.sin(a1);
          const active = i < filled;
          return (
            <path key={i}
              d={`M ${x00} ${y00} L ${x01} ${y01} L ${x11} ${y11} L ${x10} ${y10} Z`}
              fill={active ? color : theme.ruleSoft}
              opacity={active ? (0.55 + 0.4 * (i / SEGS)) : 0.45}
            />
          );
        })}
      </svg>

      {/* Sparkline if history passed — even smaller */}
      {sparkData && sparkData.length > 1 && (
        <svg viewBox={`0 0 120 14`} width="100%" height="14" style={{ display: "block" }}>
          {(() => {
            const max = 5, min = 0;
            const path = sparkData.map((s, i) => {
              const x = (i / (sparkData.length - 1)) * 120;
              const y = 12 - ((s - min) / (max - min)) * 10;
              return `${i === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
            }).join(" ");
            return <>
              <path d={path} fill="none" stroke={color} strokeWidth="1" opacity="0.6" />
              <circle
                cx={(sparkData.length - 1) / Math.max(1, sparkData.length - 1) * 120}
                cy={12 - ((sparkData[sparkData.length - 1] - min) / (max - min)) * 10}
                r="1.6" fill={color}
              />
            </>;
          })()}
        </svg>
      )}
    </div>
  );
};

const ClocksStrip = ({ brief, history, theme }) => {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "repeat(6, 1fr)",
      gap: 10,
    }}>
      {window.CLOCK_ORDER.map(k => {
        const spark = history.map(b => ClockScore(b.clocks[k]));
        return (
          <ClockDial
            key={k}
            clockKey={k}
            state={brief.clocks[k]}
            trajectory={brief.trajectory[k]}
            theme={theme}
            sparkData={spark}
          />
        );
      })}
    </div>
  );
};

Object.assign(window, { ClockDial, ClocksStrip, ClockScore });

  ];
  // Delta 24–48h: current - previous brief
  const prev = history[history.length - 2] || brief;
  return (

      {actors.map(a => {

              <span style={{ fontFamily: theme.font.display, fontSize: 30, fontWeight: 600, color: theme.ink, letterSpacing: "-0.02em" }}>

              <span style={{ fontFamily: theme.font.display, fontSize: 22, fontWeight: 500, color: theme.inkSoft }}>

            </div>

              values={history.map(h => h.casualties[a.key][0])}
              color={a.color}
              theme={theme}
            />
          </div>
        );
      })}
    </div>
  );
};

const Sparkbar = ({ values, color, theme }) => {
  const max = Math.max(...values, 1);
  return (
    <svg viewBox={`0 0 ${values.length * 10} 24`} width="100%" height="24" style={{ marginTop: 10, display: "block" }}>
      {values.map((v, i) => {
        const h = Math.max(1, (v / max) * 22);
        return (
          <rect key={i}
            x={i * 10 + 1} y={24 - h}
            width={7} height={h}
            fill={color} opacity={0.35 + 0.6 * (i / Math.max(1, values.length - 1))}
          />
        );
      })}
    </svg>
  );
};

const CasualtiesView = ({ briefs, theme }) => {
  const actors = [
    { key:"iran",   label:"Iran & Proxies",   color: theme.accentAmber },
    { key:"israel", label:"Israel",           color: theme.accent },
    { key:"other",  label:"Other",            color: theme.accentGreen },
    { key:"us",     label:"United States",    color: theme.ink },
  ];

  // Stacked area data
  const W = 1000, H = 320, pad = { l: 54, r: 24, t: 20, b: 40 };
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const xs = i => pad.l + (i / Math.max(1, briefs.length - 1)) * iw;
  // Compute stacks
  const stacks = briefs.map((b, i) => {
    let acc = 0;
    const out = {};
    for (const a of actors) {
      const v = b.casualties[a.key][0];
      out[a.key] = { y0: acc, y1: acc + v };
      acc += v;
    }
    out._total = acc;
    return out;
  });
  const maxTotal = Math.max(...stacks.map(s => s._total));
  const ys = v => pad.t + ih - (v / maxTotal) * ih;

  return (
    <div>
      <window.SectionRule theme={theme} number={1} label="Cumulative casualties — KIA by actor" right={`max ${maxTotal.toLocaleString()}`} />
      <div style={{ fontFamily: theme.font.sans, fontSize: 13, color: theme.inkSoft, marginBottom: 14, maxWidth: 680, lineHeight: 1.55 }}>
        Stacked area. Figures are analytical estimates drawn from open-source reporting; casualty revisions are flagged in the frontmatter of individual briefs.
        No counts decrease without an explicit <span style={{ fontFamily: theme.font.mono, color: theme.ink }}>casualty_revision: true</span> acknowledgment.
      </div>
      <div style={{ border: `1px solid ${theme.ruleSoft}`, background: theme.cardBg, padding: 14 }}>
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }}>
          {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
            const v = Math.round(maxTotal * (1 - t));
            return (
              <g key={i}>
                <line x1={pad.l} x2={W - pad.r} y1={pad.t + t * ih} y2={pad.t + t * ih} stroke={theme.ruleSoft} strokeDasharray="1 3" />
                <text x={pad.l - 6} y={pad.t + t * ih + 3} textAnchor="end" style={{ fontFamily: theme.font.mono, fontSize: 9, fill: theme.inkMute }}>
                  {v.toLocaleString()}
                </text>
              </g>
            );
          })}
          {actors.map((a, ai) => {
            const pathTop = stacks.map((s, i) => `${i === 0 ? "M" : "L"} ${xs(i)} ${ys(s[a.key].y1)}`).join(" ");
            const pathBot = stacks.map((s, i) => ` L ${xs(stacks.length - 1 - i)} ${ys(stacks[stacks.length - 1 - i][a.key].y0)}`).join("");
            return <path key={a.key} d={pathTop + pathBot + " Z"} fill={a.color} opacity="0.5" stroke={a.color} strokeWidth="1" />;
          })}
          {briefs.map((b, i) => i % 2 === 0 && (
            <text key={i} x={xs(i)} y={H - pad.b + 14} textAnchor="middle" style={{ fontFamily: theme.font.mono, fontSize: 9, fill: theme.inkMute }}>D{b.day}</text>
          ))}
        </svg>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 20, marginTop: 14, flexWrap: "wrap" }}>
        {actors.map(a => {
          const latest = briefs[briefs.length - 1].casualties[a.key];
          return (
            <div key={a.key} style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ width: 14, height: 14, background: a.color, opacity: 0.65, border: `1px solid ${a.color}` }} />
              <span style={{ fontFamily: theme.font.sans, fontSize: 13, color: theme.ink }}>{a.label}</span>
              <span style={{ fontFamily: theme.font.mono, fontSize: 12, color: theme.inkMute }}>
                KIA {latest[0].toLocaleString()} · WIA {latest[1].toLocaleString()}
              </span>
            </div>
          );
        })}
      </div>

      {/* Table of latest */}
      <window.SectionRule theme={theme} number={2} label="Latest brief snapshot" />

  const [density, setDensity]   = useState(persisted.density || TWEAK_DEFAULTS.density);
  const [day, setDay]           = useState(persisted.day ?? TWEAK_DEFAULTS.day);
  const [view, setView]         = useState(persisted.view || "today");
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaksAvailable, setTweaksAvailable] = useState(false);

  // Persist
  useEffect(() => {
    localStorage.setItem("mewar:state", JSON.stringify({ theme: themeKey, density, day, view }));
    window.__view = view;
  }, [themeKey, density, day, view]);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setTweaksAvailable(true);
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setTweak = (patch) => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  const theme = window.THEMES[themeKey];
  const briefs = window.BRIEFS;
  const brief = briefs.find(b => b.day === day) || briefs[briefs.length - 1];
  const historyUpTo = briefs.filter(b => b.day <= brief.day);

  const contentPad = density === "compact" ? "18px 28px" : density === "roomy" ? "36px 56px" : "28px 44px";
  const maxW = density === "compact" ? 1200 : density === "roomy" ? 1400 : 1280;

  return (
    <div style={{
      minHeight: "100vh",
      background: theme.bg,
      color: theme.ink,
      fontFamily: theme.font.sans,
      // Subtle paper grain via radial gradients only on paper theme
      backgroundImage: themeKey === "paper"
        ? `radial-gradient(circle at 20% 10%, ${theme.bgDeep}22 0%, transparent 40%), radial-gradient(circle at 80% 90%, ${theme.bgDeep}22 0%, transparent 50%)`
        : themeKey === "terminal"
        ? "repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px)"
        : "none",
    }}>
      <div data-screen-label={`View ${view}`} style={{ maxWidth: maxW, margin: "0 auto", padding: contentPad }}>
        <window.Masthead theme={theme} brief={brief} day={brief.day} totalDays={briefs.length} onNav={setView} view={view} />

        {view === "today" && (
          <window.TodayView brief={brief} history={historyUpTo} theme={theme} onNav={setView} totalDays={briefs.length} />
        )}
        {view === "archive" && (
          <window.ArchiveView briefs={briefs} theme={theme} onNav={setView} currentDay={day} setDay={setDay} />
        )}
        {view === "timeline" && (
          <window.TimelineView briefs={briefs} theme={theme} onNav={setView} setDay={setDay} />
        )}
        {view === "casualties" && (
          <window.CasualtiesView briefs={briefs} theme={theme} />
        )}
        {view === "clocks" && (
          <window.ClocksDashboardView briefs={briefs} theme={theme} />
        )}
        {view === "about" && (
          <window.AboutView theme={theme} />
        )}

        {/* Footer */}
        <div style={{
          marginTop: 48, paddingTop: 16,
          borderTop: `1px solid ${theme.ruleSoft}`,
          display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap",
          fontFamily: theme.font.mono, fontSize: 10, letterSpacing: "0.12em",
          textTransform: "uppercase", color: theme.inkMute,
        }}>
          <span>© 2026 3D · @8gara8</span>
          <span>·</span>
          <span>Git audit trail: /content/briefs/</span>
          <span>·</span>
          <span>Next.js 15 · Vercel · MIT</span>
          <span style={{ marginLeft: "auto" }}>
            Brief timestamp: <window.Num theme={theme}>{brief.date}T01:00Z</window.Num>
          </span>
        </div>
      </div>

      {/* Day scrubber — persistent bottom bar */}
      <DayScrubber briefs={briefs} day={day} setDay={setDay} theme={theme} view={view} setView={setView} />

      {/* Tweaks panel */}
      {tweaksOpen && (
        <TweaksPanel
          themeKey={themeKey} setThemeKey={(v) => { setThemeKey(v); setTweak({ theme: v }); }}
          density={density} setDensity={(v) => { setDensity(v); setTweak({ density: v }); }}
          day={day} setDay={(v) => { setDay(v); setTweak({ day: v }); }}
          briefs={briefs} onClose={() => setTweaksOpen(false)}
        />
      )}
    </div>
  );
};

const DayScrubber = ({ briefs, day, setDay, theme, view, setView }) => {
  return (
    <div style={{
      position: "fixed", left: 0, right: 0, bottom: 0,
      background: theme.bgDeep, borderTop: `1px solid ${theme.rule}`,
      padding: "10px 20px", display: "flex", alignItems: "center", gap: 14,
      zIndex: 50, backdropFilter: "blur(4px)",
    }}>
      <span style={{ fontFamily: theme.font.mono, fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: theme.inkMute }}>
        Day scrubber
      </span>
      <div style={{ display: "flex", gap: 2, flex: 1, alignItems: "center" }}>
        {briefs.map(b => {
          const active = b.day === day;
          const color = b.direction === "escalating" ? theme.accent :
                        b.direction === "mixed" ? theme.accentAmber : theme.accentGreen;
          return (
            <button key={b.day}
              onClick={() => { setDay(b.day); if (view !== "today") setView("today"); }}
              title={`Day ${b.day} — ${b.date} — ${b.title}`}
              style={{
                flex: 1, background: active ? color : theme.cardBg,
                border: `1px solid ${active ? color : theme.ruleSoft}`,
                height: active ? 36 : 24, cursor: "pointer",
                transition: "height 0.12s",
                position: "relative",
              }}>
              <span style={{
                position: "absolute", inset: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: theme.font.mono, fontSize: 10, color: active ? theme.bg : theme.inkMute,
                fontWeight: active ? 700 : 400,
              }}>{b.day}</span>
            </button>
          );
        })}
      </div>
      <span style={{ fontFamily: theme.font.mono, fontSize: 11, color: theme.ink, minWidth: 130, textAlign: "right" }}>
        Day {String(day).padStart(3,"0")} · {briefs.find(b => b.day === day)?.date}
      </span>
    </div>
  );
};

const TweaksPanel = ({ themeKey, setThemeKey, density, setDensity, day, setDay, briefs, onClose }) => {
  const theme = window.THEMES[themeKey];
  return (
    <div style={{
      position: "fixed", top: 20, right: 20, width: 300, zIndex: 100,
      background: theme.cardBg, border: `1px solid ${theme.rule}`,
      boxShadow: "0 20px 60px rgba(0,0,0,0.25)",
      fontFamily: theme.font.sans, color: theme.ink,
    }}>
      <div style={{
        padding: "10px 14px", borderBottom: `1px solid ${theme.rule}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: theme.bgDeep,
      }}>
        <span style={{ fontFamily: theme.font.mono, fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase" }}>
          Tweaks
        </span>
        <button onClick={onClose} style={{
          background: "none", border: "none", color: theme.inkMute,
          cursor: "pointer", fontFamily: theme.font.mono, fontSize: 14,
        }}>×</button>
      </div>

      <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 16 }}>
        <TweakGroup label="Theme" theme={theme}>
          {Object.entries(window.THEMES).map(([k, t]) => (
            <TweakOption key={k} active={themeKey === k} onClick={() => setThemeKey(k)} theme={theme}>
              <span style={{
                display: "inline-block", width: 10, height: 10,
                background: t.accent, marginRight: 8,
              }} />{t.label}
            </TweakOption>
          ))}
        </TweakGroup>

        <TweakGroup label="Density" theme={theme}>
          {["compact","comfortable","roomy"].map(d => (
            <TweakOption key={d} active={density === d} onClick={() => setDensity(d)} theme={theme}>
              {d}
            </TweakOption>
          ))}
        </TweakGroup>

        <TweakGroup label={`Day (${day})`} theme={theme}>
          <input type="range" min={1} max={briefs.length} value={day}
            onChange={e => setDay(+e.target.value)}
            style={{ width: "100%", accentColor: theme.accent }}
          />
        </TweakGroup>
      </div>
    </div>
  );
};

const TweakGroup = ({ label, theme, children }) => (
  <div>
    <div style={{
      fontFamily: theme.font.mono, fontSize: 10, letterSpacing: "0.14em",
      textTransform: "uppercase", color: theme.inkMute, marginBottom: 6,
    }}>{label}</div>
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{children}</div>
  </div>
);

const TweakOption = ({ active, onClick, children, theme }) => (
  <button onClick={onClick} style={{
    background: active ? theme.ink : "transparent",
    color: active ? theme.bg : theme.ink,
    border: `1px solid ${active ? theme.ink : theme.ruleSoft}`,
    padding: "6px 10px", cursor: "pointer",
    fontFamily: theme.font.mono, fontSize: 11,
    letterSpacing: "0.08em", textTransform: "uppercase",
  }}>{children}</button>
);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);


</script>
</body>
</html>
